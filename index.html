<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Practice</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🇩🇪 German Practice</h1>

        <div class="topic-bar">
            <label for="topicSelect">Topic:</label>
            <select id="topicSelect"></select>
        </div>

        <div class="stats">
            <span>Progress: <span id="progress">0</span>/<span id="total">0</span></span>
            <span>Score: <span id="score">0</span></span>
        </div>

        <div class="warning" id="micWarning">
            ⚠️ Microphone blocked by browser. Voice input only works on <code>localhost</code>.
            Use the text box below instead!
        </div>

        <div class="card">
            <div class="verb-label" id="verb">Verb</div>
            <div class="prompt" id="prompt">Loading...</div>
            <div class="translation" id="translation"></div>

            <div class="actions">
                <button class="btn-read" id="btnRead">🔊 Read Aloud</button>
                <button class="btn-speak" id="btnSpeak">🎤 Speak</button>
            </div>

            <div class="input-group">
                <input type="text" id="answerInput" placeholder="Loading..." autocomplete="off">
                <button class="btn-check" id="btnCheck">✅ Check Answer</button>
            </div>
            <div class="status" id="inputMode" style="text-align:left;font-size:0.8em;"></div>

            <div class="result-box" id="result">
                <div class="your-answer">Your answer: <span id="userAnswer"></span></div>
                <div class="correct-answer">Correct answer: <span id="correctAnswer"></span></div>
            </div>

            <div class="status" id="status"></div>
        </div>

        <div class="nav">
            <button class="btn-next" id="btnPrev">← Previous</button>
            <button class="btn-next" id="btnNext">Next →</button>
        </div>
    </div>

    <script src="js/topics.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
